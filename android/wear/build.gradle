apply plugin: 'com.android.application'
apply plugin: 'org.jetbrains.kotlin.android'

android {
    namespace = "com.aera.app.wear"
    compileSdk = rootProject.ext.compileSdkVersion
    kotlinOptions {
        jvmTarget = "21"
    }
    defaultConfig {
        // MUST match the phone app id so the Wearable Data Layer pairs the two.
        applicationId "com.aera.app"
        minSdkVersion 30
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"
    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
}

dependencies {
    implementation 'androidx.core:core-ktx:1.13.1'
    implementation 'androidx.appcompat:appcompat:1.7.0'
    implementation 'androidx.lifecycle:lifecycle-service:2.8.7'
    // Live HR without Samsung partnership (Wear OS 3+).
    implementation 'androidx.health:health-services-client:1.0.0'
    // Wearable Data Layer to reach the phone.
    implementation 'com.google.android.gms:play-services-wearable:18.2.0'
    implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.8.1'
}
